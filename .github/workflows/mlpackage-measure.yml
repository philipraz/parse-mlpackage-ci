name: mlpackage-measure

# Manual trigger (Actions tab -> Run workflow).
on:
  workflow_dispatch:

jobs:
  measure:
    # Apple Silicon runner = has the Neural Engine, closest proxy to the iPhone.
    runs-on: macos-14
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Produces input_pv.npy + ref_hidden.npy (the fixed input + PyTorch fp32 ref).
      - name: Convert encoder + reference tensors
        run: python ci_mlpackage.py convert

      # fp16-safe didn't recover (0.962): the bad op isn't norms/softmax/reductions.
      # Localize it — per op-type AND per graph position (deep-residual overflow).
      - name: Precision probe (localize the fp16-unstable op)
        run: python ci_mlpackage.py precision-probe
        
