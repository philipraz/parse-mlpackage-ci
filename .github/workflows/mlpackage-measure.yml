name: mlpackage-measure

# Manual trigger (Actions tab -> Run workflow).
on:
  workflow_dispatch:

jobs:
  measure:
    # Apple Silicon runner = has the Neural Engine, closest proxy to the iPhone.
    runs-on: macos-14
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Produces input_pv.npy + ref_hidden.npy (fixed input + PyTorch fp32 ref).
      - name: Convert encoder + reference tensors
        run: python ci_mlpackage.py convert

      # THE FIX: keep `linear` ops fp32 (0.958->0.996). Saves canonical
      # encoder_fp16.mlpackage; reports cos + disk + in-process resident.
      - name: Ship candidate (linear-fp32) cos + size + resident
        run: python ci_mlpackage.py ship-candidate

      # Per-run retention (the ORT failure mode) on the ship candidate.
      - name: Leak check (sequential predicts)
        run: python ci_mlpackage.py leak-check

      # Precompile -> .mlmodelc so the phone NEVER runtime-compiles (that's the
      # ~5.5GB peak spike that would jetsam the first launch). Side-load THIS.
      - name: Precompile .mlmodelc
        run: |
          rm -rf mlmodelc_out && mkdir mlmodelc_out
          xcrun coremlcompiler compile encoder_fp16.mlpackage mlmodelc_out
          echo "=== compiled output ===" && ls -la mlmodelc_out
          du -sh mlmodelc_out/* || true

      - name: Upload precompiled .mlmodelc (side-load this)
        uses: actions/upload-artifact@v4
        with:
          name: encoder_linear-fp32-mlmodelc
          path: mlmodelc_out
          if-no-files-found: warn

      - name: Upload ship-candidate .mlpackage (backup)
        uses: actions/upload-artifact@v4
        with:
          name: encoder_linear-fp32-mlpackage
          path: encoder_fp16.mlpackage
          if-no-files-found: warn
